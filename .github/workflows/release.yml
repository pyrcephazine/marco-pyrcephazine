name: Publish Debian release

on:
  push:
    tags:
      - "v*-pyrcephazine.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build and publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build Debian 13 amd64 packages
    runs-on: ubuntu-24.04
    container: debian:13-slim
    steps:
      - name: Install bootstrap tools
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install --yes --no-install-recommends \
            build-essential ca-certificates devscripts equivs git lintian xz-utils

      - name: Check out the release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Install package build dependencies
        run: >-
          mk-build-deps --install --remove
          --tool "apt-get --yes --no-install-recommends"
          debian/control

      - name: Build and validate release artifacts
        run: ./packaging/build-release-artifacts.sh "$RELEASE_TAG" "$GITHUB_WORKSPACE/dist"

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: dist/
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out release metadata
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: dist

      - name: Verify artifact checksums
        working-directory: dist
        run: sha256sum --check SHA256SUMS

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Marco Pyrcephazine ${RELEASE_TAG#v}"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
            gh release edit "$RELEASE_TAG" --title "$title" --notes-file packaging/release-notes.md
          else
            gh release create "$RELEASE_TAG" dist/* \
              --verify-tag \
              --title "$title" \
              --notes-file packaging/release-notes.md
          fi
